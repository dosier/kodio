name: Build and Deploy Docs

on:
  push:
    branches: ["master"]
    paths:
      - 'kodio-docs/**'
      - '.github/workflows/docs.yml'
      - '**.kt'
      - '**.kts'
      - 'gradle/libs.versions.toml'
      - 'gradle.properties'
  pull_request:
    branches: ["master"]
    paths:
      - 'kodio-docs/**'
      - '**.kt'
      - '**.kts'
      - 'gradle/libs.versions.toml'
      - 'gradle.properties'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  INSTANCE: 'kodio-docs/k'
  ARTIFACT: 'webHelpK2-all.zip'
  DOCKER_VERSION: '243.22562'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build docs using Writerside Docker builder
        uses: JetBrains/writerside-github-action@v4
        with:
          instance: ${{ env.INSTANCE }}
          artifact: ${{ env.ARTIFACT }}
          docker-version: ${{ env.DOCKER_VERSION }}

      - name: Save artifact with samples
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: |
            artifacts/${{ env.ARTIFACT }}
            artifacts/report.json
          retention-days: 7

  test:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: artifacts

      - name: Test documentation
        uses: JetBrains/writerside-checker-action@v1
        with:
          instance: ${{ env.INSTANCE }}

  api-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate API documentation
        run: ./gradlew :dokkaGenerate --no-configuration-cache

      - name: Upload API docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: build/dokka/html
          retention-days: 7

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: [build, test, api-docs]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    
    steps:
      - name: Download Writerside docs
        uses: actions/download-artifact@v4
        with:
          name: docs

      - name: Download API docs
        uses: actions/download-artifact@v4
        with:
          name: api-docs
          path: api-docs

      - name: Unzip artifact
        run: |
          unzip -O UTF-8 -qq '${{ env.ARTIFACT }}' -d dir

      - name: Merge API docs into Pages artifact
        run: |
          mkdir -p dir/api
          cp -r api-docs/. dir/api/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Package and upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dir

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
