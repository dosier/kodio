# This workflow builds and tests the project across the platforms Kodio
# supports. It runs on pushes to master, PRs, and is callable from publish.yml.
# Tests are skipped for documentation-only changes.
#
# The matrix expands the previous single Linux JVM job to cover the targets
# called for in GitHub issues #11–#15:
#   - linux-jvm     (#15) JVM tests on Linux (host-gated macOS native deps)
#   - android-unit  (#12) Android unit tests
#   - web           (#14) JS + WasmJS browser tests
#   - macos-native  (#13) macOS Kotlin/Native tests
#   - ios-sim       (#11) iOS simulator tests

name: CI

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]  # Always run on version tags for validation before publish
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'kodio-docs/**'
      - '.github/*.yml'
      - '.github/ISSUE_TEMPLATE/**'
      - '.cursorrules'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'kodio-docs/**'
      - '.github/*.yml'
      - '.github/ISSUE_TEMPLATE/**'
      - '.cursorrules'
      - 'LICENSE'
      - '.gitignore'
  workflow_call:  # Allows publish.yml to call this workflow (no path filtering)

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.id }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-jvm
            os: ubuntu-latest
            tasks: "jvmTest"
          - id: android-unit
            os: ubuntu-latest
            tasks: "testDebugUnitTest testReleaseUnitTest"
          - id: web
            os: ubuntu-latest
            tasks: "jsBrowserTest wasmJsBrowserTest"
            install_chrome: true
          - id: macos-native
            os: macos-latest
            tasks: "macosArm64Test macosX64Test"
          - id: ios-sim
            os: macos-latest
            tasks: "iosSimulatorArm64Test"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Chrome (for browser tests)
        if: ${{ matrix.install_chrome == true }}
        uses: browser-actions/setup-chrome@v1

      - name: Cache Kotlin/Native
        if: ${{ runner.os == 'macOS' }}
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Run ${{ matrix.id }} tests
        run: ./gradlew ${{ matrix.tasks }} --no-configuration-cache --stacktrace
